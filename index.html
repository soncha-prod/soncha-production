<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
Soncha Production
</title>

<link rel="icon" href="images/icon.svg">

<link rel="apple-touch-icon" href="images/icon.svg">


<style>


*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}


body{

font-family:
-apple-system,
BlinkMacSystemFont,
"SF Pro Display",
Arial,
sans-serif;

background:#fff;

color:#111;

transition:.4s;

overflow-x:hidden;

}



body.dark{

background:#000;

color:#fff;

}



a{

text-decoration:none;

color:inherit;

}




/* LOADER */


.loader{

position:fixed;

inset:0;

background:#fff;

display:flex;

justify-content:center;

align-items:center;

flex-direction:column;

z-index:9999;

animation:hideLoader 2.5s forwards;

}



body.dark .loader{

background:#000;

}



.loader-logo{

width:110px;

height:110px;

border-radius:35px;

background:

linear-gradient(
145deg,
#111,
#333
);


color:white;

display:flex;

align-items:center;

justify-content:center;

font-size:38px;

font-weight:800;

letter-spacing:-3px;

box-shadow:

0 25px 70px rgba(0,0,0,.35);

animation:

logoAppear 1.2s ease,
pulse 2s infinite;

}



.loader p{

margin-top:25px;

font-size:22px;

font-weight:600;

}





@keyframes hideLoader{

0%{
opacity:1;
}

80%{
opacity:1;
}

100%{

opacity:0;

visibility:hidden;

}

}



@keyframes logoAppear{

0%{

opacity:0;

transform:

scale(.5)
rotate(-10deg);

filter:blur(10px);

}


100%{

opacity:1;

transform:

scale(1)
rotate(0);

filter:blur(0);

}

}



@keyframes pulse{

50%{

transform:scale(1.08);

}

}





/* NAV */


nav{

position:fixed;

top:20px;

left:50%;

transform:translateX(-50%);

width:90%;

max-width:1100px;

padding:18px 30px;

border-radius:50px;

background:

rgba(255,255,255,.7);

backdrop-filter:blur(20px);

display:flex;

justify-content:space-between;

align-items:center;

z-index:1000;

}



body.dark nav{

background:

rgba(20,20,20,.7);

}





.logo{

display:flex;

align-items:center;

font-size:24px;

font-weight:700;

}



.logo span{

color:#0071e3;

}





.logo-s{

width:42px;

height:42px;

border-radius:14px;

background:

linear-gradient(
145deg,
#111,
#333
);

color:white;

display:flex;

align-items:center;

justify-content:center;

font-size:17px;

font-weight:800;

letter-spacing:-1px;

margin-right:10px;

}





.menu{

display:flex;

gap:30px;

}



.menu a{

color:#777;

transition:.3s;

}



.menu a:hover{

color:#0071e3;

}




.theme{

width:42px;

height:42px;

border-radius:50%;

border:none;

cursor:pointer;

background:#eee;

}





/* HERO */


.hero{

min-height:100vh;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

text-align:center;

padding:120px 30px;

}



.hero h1{

font-size:

clamp(70px,12vw,150px);

letter-spacing:-8px;

}



.hero p{

font-size:28px;

max-width:700px;

margin-top:35px;

color:#6e6e73;

}



.main-btn{

margin-top:45px;

padding:18px 40px;

border-radius:50px;

background:#0071e3;

color:white;

transition:.4s;

}



.main-btn:hover{

transform:

translateY(-5px)
scale(1.05);

}
    /* FLOATING DEVICE */


.device{

margin-top:90px;

width:320px;

height:620px;

border-radius:45px;

background:#111;

padding:12px;

box-shadow:

0 40px 100px rgba(0,0,0,.3);

animation:floating 4s ease-in-out infinite;

}



.screen{

width:100%;

height:100%;

border-radius:35px;

background:

linear-gradient(
135deg,
#0071e3,
#111
);


display:flex;

align-items:center;

justify-content:center;

color:white;

font-size:50px;

font-weight:800;

}



@keyframes floating{

0%{

transform:translateY(0);

}


50%{

transform:translateY(-25px);

}


100%{

transform:translateY(0);

}

}







/* PROJECTS */


.projects{

padding:140px 40px;

background:#f5f5f7;

text-align:center;

}



body.dark .projects{

background:#111;

}



.projects h2,

.services h2,

.about h2,

.contact h2{

font-size:70px;

letter-spacing:-4px;

}





.cards{

margin-top:80px;

display:flex;

justify-content:center;

gap:35px;

flex-wrap:wrap;

}





.card{

width:330px;

background:white;

border-radius:35px;

overflow:hidden;

transition:.5s;

}



body.dark .card{

background:#1c1c1e;

}



.card:hover{

transform:

translateY(-20px)
scale(1.03);

box-shadow:

0 35px 80px rgba(0,0,0,.2);

}



.card img{

width:100%;

height:220px;

object-fit:cover;

}



.card h3{

font-size:35px;

margin-top:25px;

}



.card p{

padding:20px 25px 35px;

color:#6e6e73;

}







/* SERVICES */


.services{

padding:140px 40px;

text-align:center;

}



.service-boxes{

display:flex;

justify-content:center;

gap:30px;

flex-wrap:wrap;

margin-top:70px;

}



.service{

width:300px;

padding:45px 30px;

border-radius:35px;

background:#f5f5f7;

transition:.4s;

}



body.dark .service{

background:#151515;

}



.service:hover{

transform:

translateY(-15px);

}



.service span{

font-size:50px;

}



.service h3{

font-size:30px;

margin:20px;

}



.service p{

color:#6e6e73;

}







/* ABOUT */


.about{

padding:140px 40px;

text-align:center;

}



.about p{

max-width:750px;

margin:40px auto;

font-size:27px;

color:#6e6e73;

}



.stats{

display:flex;

justify-content:center;

gap:90px;

flex-wrap:wrap;

margin-top:80px;

}



.stats strong{

display:block;

font-size:70px;

}



.stats span{

color:#6e6e73;

}
    /* CONTACT */


.contact{

padding:140px 40px;

background:#000;

color:white;

text-align:center;

}



.contact p{

margin-top:25px;

font-size:25px;

color:#aaa;

}



form{

max-width:550px;

margin:60px auto;

display:flex;

flex-direction:column;

gap:18px;

}



input,

textarea{

padding:20px;

border-radius:25px;

border:none;

font-size:17px;

font-family:inherit;

outline:none;

}



textarea{

height:160px;

resize:none;

}



form button{

padding:20px;

border:none;

border-radius:50px;

background:#0071e3;

color:white;

font-size:18px;

cursor:pointer;

transition:.3s;

}



form button:hover{

transform:scale(1.05);

}





.success-message{

display:none;

max-width:550px;

margin:30px auto;

padding:25px;

border-radius:25px;

background:#0071e3;

color:white;

font-size:20px;

line-height:1.6;

}



.success-message.show{

display:block;

animation:fadeIn .5s ease;

}



@keyframes fadeIn{

from{

opacity:0;

transform:translateY(20px);

}


to{

opacity:1;

transform:translateY(0);

}

}







/* FOOTER */


footer{

padding:40px;

text-align:center;

color:#777;

}







/* SCROLL EFFECT */


.reveal{

opacity:0;

transform:translateY(50px);

transition:.8s;

}



.reveal.active{

opacity:1;

transform:translateY(0);

}







/* MOBILE */


@media(max-width:768px){


.menu{

display:none;

}



nav{

width:92%;

}



.hero h1{

letter-spacing:-4px;

}



.hero p{

font-size:20px;

}



.device{

width:280px;

height:540px;

}



.projects h2,

.services h2,

.about h2,

.contact h2{

font-size:45px;

}



.stats{

gap:40px;

}


}
    <section class="contact reveal" id="contact">

<h2>
Связаться со мной
</h2>


<p>
Есть идея или проект? Расскажите о нём.
</p>



<form id="contactForm" action="https://formspree.io/f/xykqrneq" method="POST">


<input
type="text"
name="name"
placeholder="Ваше имя"
required>


<input
type="email"
name="email"
placeholder="Ваш Email"
required>



<textarea
name="message"
placeholder="Расскажите о вашем проекте..."
required></textarea>



<input
type="hidden"
name="_subject"
value="Новая заявка с сайта Soncha Production">



<button type="submit">
Отправить →
</button>


</form>



<div id="successMessage" class="success-message">

✓ Спасибо!<br>
Ваше сообщение отправлено.<br>
Я свяжусь с вами в ближайшее время.

</div>


</section>




<footer>

© 2026 Soncha Production

</footer>
    <script>


// DARK MODE


function theme(){

document.body.classList.toggle("dark");

}








// FORM WITHOUT FORMSPREE REDIRECT


const form = document.getElementById("contactForm");

const successMessage = document.getElementById("successMessage");



form.addEventListener("submit", async (e)=>{


e.preventDefault();



const response = await fetch(form.action, {


method:"POST",


body:new FormData(form),


headers:{


"Accept":"application/json"


}


});





if(response.ok){


form.reset();


successMessage.classList.add("show");



setTimeout(()=>{


successMessage.classList.remove("show");


},5000);



}


else{


alert(
"Ошибка отправки. Попробуйте ещё раз."
);


}



});








// SCROLL ANIMATION


function reveal(){


const elements = document.querySelectorAll(".reveal");



elements.forEach((element)=>{


const position = element.getBoundingClientRect().top;



if(position < window.innerHeight - 100){


element.classList.add("active");


}



});


}



window.addEventListener(
"scroll",
reveal
);



reveal();







</script>


</body>

</html>
